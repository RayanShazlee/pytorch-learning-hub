name: Deploy to GitHub Pages

on:
  push:
    branches:
      - main
      - copilot/host-website-live
  workflow_dispatch:

# Only contents: write is needed to publish to the gh-pages branch.
permissions:
  contents: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        # @github/spark peer-deps resolve against vite < 8, but this repo
        # pins vite ^8. Use legacy peer dep resolution to install cleanly.
        run: npm ci --legacy-peer-deps

      - name: Build site
        run: npm run build

      - name: Add SPA fallback (copy index.html to 404.html)
        run: cp dist/index.html dist/404.html

      - name: Disable Jekyll processing
        run: touch dist/.nojekyll

      - name: Publish to gh-pages branch
        uses: peaceiris/actions-gh-pages@4f9cc6602d3f66b9c108549d475ec49e8ef4d45e # v4.0.0
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./dist
          publish_branch: gh-pages
